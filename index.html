<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💗 爱心飘落 · 卫星环绕纪念 💗</title>
    <!-- 使用 Marked 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #fff9fc;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow-x: hidden;
            position: relative;
        }

        /* 爱心飘落容器 - 覆盖整个视口 */
        #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 让爱心不阻挡点击 */
            z-index: 1;
            overflow: hidden;
        }

        /* 飘落爱心样式 */
        .heart-decoration {
            position: absolute;
            font-size: 24px;
            color: #ffb6c1; /* 粉色 */
            z-index: 0;
            animation: fall 8s linear infinite;
            opacity: 0.8;
            user-select: none;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(255, 182, 193, 0.5);
        }

        @keyframes fall {
            0% {
                transform: translateY(-20vh) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }

        .frame {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 9 / 16;
            background: rgba(255, 245, 248, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(245, 150, 180, 0.25),
                        0 0 0 2px #ffe2eb inset;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            z-index: 10; /* 确保在主容器在爱心上方 */
        }

        /* 中央图片容器 - 设置固定层级为 20（中间层） */
        .center-image-wrapper {
            width: 30%;
            aspect-ratio: 1 / 1;
            position: relative;
            z-index: 20;  /* 中间层级：高于 behind (5)，低于 front (35) */
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 25px #ffb6c190, 0 0 0 4px #ffe4ed;
            transition: all 0.1s ease;
        }

        .center-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: inherit;
            background: #ffd9e5;
        }

        /* 轨道容器 - 不再整体旋转 */
        .orbit-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
        }

        /* 气泡基础样式 */
        .bubble {
            position: absolute;
            width: 120px;
            max-width: 30vw;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: #fff0f5;
            border: 2px solid #ffb3c6;
            border-radius: 32px 32px 32px 8px;
            padding: 12px 14px;
            box-shadow: 0 10px 20px #ffa5b9a0, 0 4px 0 0 #fcc4d2 inset;
            color: #a93f5c;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            pointer-events: auto;
            transition: transform 0.2s ease, filter 0.3s;
            transform-origin: center;
            left: 50%;
            top: 50%;
            opacity: 0;
            animation: bubble-fadein 0.4s forwards;
        }

        /* 淡入动画 */
        @keyframes bubble-fadein {
            0% { opacity: 0; transform: scale(0.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 遮挡关系类 - 重新定义层级 */
        .bubble.behind {
            z-index: 5;  /* 在主图片后面 (主图片 z-index:20) */
        }

        .bubble.front {
            z-index: 35; /* 在主图片前面 (主图片 z-index:20) */
        }

        /* 气泡内的 markdown 样式 */
        .bubble h1, .bubble h2, .bubble h3 {
            font-size: 1.3em;
            color: #c34f6a;
            margin: 4px 0;
        }
        .bubble p {
            margin: 4px 0;
        }
        .bubble em {
            color: #d66b81;
        }
        .bubble strong {
            color: #b3405c;
        }
        .bubble a {
            color: #b33f5c;
            text-decoration: underline wavy #ffb0c0 1px;
        }

        /* 全屏缩小动画相关 */
        .center-image-wrapper.initial-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 0;
            z-index: 100;  /* 全屏时在最上层 */
            box-shadow: none;
            transition: all 1.2s cubic-bezier(0.34, 1.2, 0.55, 1);
        }

        .center-image-wrapper.initial-full .center-image {
            border-radius: 0;
        }

        .center-image-wrapper.final-state {
            position: relative;
            width: 30%;
            top: auto;
            left: auto;
            border-radius: 30px;
            box-shadow: 0 15px 25px #ffb6c190, 0 0 0 4px #ffe4ed;
            transition: all 1.2s cubic-bezier(0.34, 1.2, 0.55, 1);
            z-index: 20;  /* 确保最终状态也是中间层 */
        }

        /* 装饰元素 */
        .decoration-dot {
            position: absolute;
            bottom: 12px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #ffc1d0, #ffd9e4);
            border-radius: 50%;
            opacity: 0.5;
            z-index: 5;
        }
        .decoration-heart {
            position: absolute;
            top: 16px;
            left: 16px;
            font-size: 24px;
            filter: drop-shadow(0 4px 6px #fbb6c6);
            z-index: 6;
            opacity: 0.7;
        }
        .loading-tip {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: #cc8195;
            font-size: 15px;
            letter-spacing: 1px;
            z-index: 10;
            background: linear-gradient(90deg, transparent, #ffe3ec, transparent);
            padding: 8px;
        }

        .markdown-content {
            user-select: text;
        }
    </style>
</head>
<body>
    <!-- 爱心飘落容器 -->
    <div id="container"></div>

    <div class="frame">
        <div class="decoration-heart">💗🌸💗</div>
        <div class="decoration-dot"></div>

        <!-- 图片A包装：使用相对路径 -->
        <div id="imageWrapper" class="center-image-wrapper initial-full">
            <img src="picture/MainPic.jpeg" alt="情侣纪念插图" class="center-image" id="mainImage">
        </div>

        <!-- 旋转容器 (气泡将动态添加至此) -->
        <div class="orbit-container" id="orbitContainer"></div>

        <div class="loading-tip" id="statusTip">💕 加载浪漫语录中... 💕</div>
    </div>

    <script>
        (function() {
            // ---------- 1. 飘落爱心模块 ----------
            function createHearts() {
                const container = document.getElementById('container');
                if (!container) return;
                
                const heartCount = 20; // 心形数量
                
                for (let i = 0; i < heartCount; i++) {
                    const heart = document.createElement('div');
                    heart.className = 'heart-decoration';
                    heart.innerHTML = '❤';
                    heart.style.left = `${Math.random() * 100}vw`;
                    heart.style.animationDelay = `${Math.random() * 5}s`;
                    heart.style.fontSize = `${15 + Math.random() * 25}px`; // 15-40px
                    
                    // 随机轻微颜色变化
                    const hue = 340 + Math.random() * 20; // 粉红色系
                    heart.style.color = `hsl(${hue}, 80%, 80%)`;
                    
                    container.appendChild(heart);
                }
            }

            // ---------- 2. 数据加载模块 - 支持外部 JSON ----------
            let messageLibrary = [];
            let dataLoaded = false;
            
            // 加载外部 JSON 文件
            async function loadMessagesFromJSON() {
                try {
                    // 检测是否在本地文件环境
                    const isLocalFile = window.location.protocol === 'file:';
                    
                    if (isLocalFile) {
                        console.log('本地文件环境，使用内置数据');
                        // 本地环境直接使用内置数据（避免CORS）
                        messageLibrary = [
                            "##理解的开端\n2022/03/11 我们第一次确定能与对方相互理解",
                            "##第一次牵手\n2022/03/19 有人说手冷要暖一暖",
                            "##第一次拥抱\n2022/03/26 《她都这么信任我了我怎么能想别的呢》",
                            "##**The world is so beautiful that I can find a people just like me**",
                            "##散瞳\n视线完全模糊还帮忙做东西真的是真爱\n嗯，真的是真爱",
                            "##发酒疯\n2022/10/04 让我们铭记这个伟大却落寞的日子，陛下发酒疯但仍然没有能够勇敢到表白，失望",
                            "##表白\n2022/10/31 **仿佛波涛汹涌的湖面掉下一颗石头又掀起波澜万丈**",
                            "##重色轻友\n2022/11/01 给我送书，在楼下聊天把zzc静音\n2026/02/07 聊到一半扔下zzc两个小时",
                            "##大哥\n大！哥！你那个周三看到的那个女孩，真的是我女朋友哦！",
                            "##悠哉悠哉，辗转反侧\n这是一首情诗",
                            "##安心\n你靠着我睡觉的时候慢慢地我也会想睡\n现在新发现是靠着你的时候我也会很舒服想睡",
                            "##第一次亲\n2023/02/04 “你爱我吗？” “肯定 我爱你”",
                            "##猜猜币\n没想到吧！地铁单程票！",
                            "##未来的孩子？\n404 NOT FOUND",
                            "##哔卟\n哔卟~",
                            "##缘分\n那你可以选择相信我带来的缘分"
                        ];
                        dataLoaded = true;
                    } else {
                        // 在线环境使用 fetch
                        const response = await fetch('messages.json');
                        if (!response.ok) throw new Error('网络响应失败');
                        const data = await response.json();
                        messageLibrary = data.messages;
                        dataLoaded = true;
                        console.log('成功加载', messageLibrary.length, '条消息');
                    }
                } catch (error) {
                    console.error('加载失败，使用内置备用数据', error);
                    // 备用数据
                    messageLibrary = [
                        "##理解的开端\n2022/03/11 我们第一次确定能与对方相互理解",
                        "##第一次牵手\n2022/03/19 有人说手冷要暖一暖",
                        "##第一次拥抱\n2022/03/26 《她都这么信任我了我怎么能想别的呢》",
                        "##**The world is so beautiful that I can find a people just like me**",
                        "##散瞳\n视线完全模糊还帮忙做东西真的是真爱\n嗯，真的是真爱",
                        "##发酒疯\n2022/10/04 让我们铭记这个伟大却落寞的日子，陛下发酒疯但仍然没有能够勇敢到表白，失望",
                        "##表白\n2022/10/31 **仿佛波涛汹涌的湖面掉下一颗石头又掀起波澜万丈**",
                        "##重色轻友\n2022/11/01 给我送书，在楼下聊天把zzc静音\n2026/02/07 聊到一半扔下zzc两个小时",
                        "##大哥\n大！哥！你那个周三看到的那个女孩，真的是我女朋友哦！",
                        "##悠哉悠哉，辗转反侧\n这是一首情诗",
                        "##安心\n你靠着我睡觉的时候慢慢地我也会想睡\n现在新发现是靠着你的时候我也会很舒服想睡",
                        "##第一次亲\n2023/02/04 “你爱我吗？” “肯定 我爱你”",
                        "##猜猜币\n没想到吧！地铁单程票！",
                        "##未来的孩子？\n404 NOT FOUND",
                        "##哔卟\n哔卟~",
                        "##缘分\n那你可以选择相信我带来的缘分"
                    ];
                    dataLoaded = true;
                }
            }

            // 获取随机五条消息
            function getRandomFive() {
                if (!dataLoaded || messageLibrary.length === 0) {
                    console.warn('消息库未就绪，使用默认消息');
                    return ["💕 加载中...", "💕 请稍候", "💕 即将出现", "💕 爱的寄语", "💕 纪念日快乐"];
                }
                const shuffled = [...messageLibrary].sort(() => Math.random() - 0.5);
                return shuffled.slice(0, 5);
            }

            // ---------- 3. 图片错误处理 ----------
            document.getElementById('mainImage').onerror = function() {
                console.warn('图片加载失败，请检查路径 picture/MainPic.jpeg');
                this.src = 'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22400%22%20viewBox%3D%220%200%20400%20400%22%3E%3Crect%20width%3D%22400%22%20height%3D%22400%22%20fill%3D%22%23ffd9e5%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20fill%3D%22%23b3405c%22%20font-size%3D%2220%22%3E💗%20纪念日%20💗%3C%2Ftext%3E%3C%2Fsvg%3E';
            };

            // ---------- 4. 获取DOM元素 ----------
            const wrapper = document.getElementById('imageWrapper');
            const orbit = document.getElementById('orbitContainer');
            const tip = document.getElementById('statusTip');

            // 确保初始是全屏模式
            wrapper.classList.remove('final-state');
            wrapper.classList.add('initial-full');

            // ---------- 5. 椭圆轨道定位函数 ----------
            function repositionBubbles() {
                const frame = document.querySelector('.frame');
                if (!frame) return;
                
                const frameRect = frame.getBoundingClientRect();
                const centerX = frameRect.width / 2;
                const centerY = frameRect.height / 2;
                
                // 椭圆轨道参数：水平半径较大，垂直半径较小
                const radiusX = frameRect.width * 0.4;  // 水平轴
                const radiusY = frameRect.height * 0.2; // 垂直轴
                
                const bubbles = document.querySelectorAll('.bubble');
                if (bubbles.length === 0) return;
                
                const angleStep = (2 * Math.PI) / bubbles.length;
                
                // 使用时间控制旋转速度 (每 20 秒一圈)
                const startAngle = (performance.now() / 20000) * 2 * Math.PI;
                
                bubbles.forEach((bubble, idx) => {
                    const angle = startAngle + idx * angleStep;
                    
                    // 椭圆轨迹上的坐标
                    const bubbleCenterX = centerX + radiusX * Math.cos(angle);
                    const bubbleCenterY = centerY + radiusY * Math.sin(angle);
                    
                    // 获取气泡宽高
                    const w = bubble.offsetWidth;
                    const h = bubble.offsetHeight;
                    
                    if (w === 0 || h === 0) {
                        bubble.style.left = (bubbleCenterX - 60) + 'px';
                        bubble.style.top = (bubbleCenterY - 40) + 'px';
                    } else {
                        bubble.style.left = (bubbleCenterX - w/2) + 'px';
                        bubble.style.top = (bubbleCenterY - h/2) + 'px';
                    }
                    
                    // 根据 Y 坐标判断前后遮挡关系
                    // 当气泡在椭圆下半部分 (sin(angle) > 0) 时在前，上半部分在后
                    // 主图片 z-index:20 位于中间层
                    if (Math.sin(angle) > 0) {
                        bubble.classList.add('front');
                        bubble.classList.remove('behind');
                    } else {
                        bubble.classList.add('behind');
                        bubble.classList.remove('front');
                    }
                });
            }

            // ---------- 6. 动画循环 ----------
            let animationFrame;
            function startOrbitAnimation() {
                function animate() {
                    repositionBubbles();
                    animationFrame = requestAnimationFrame(animate);
                }
                animationFrame = requestAnimationFrame(animate);
            }

            // ---------- 7. 初始化气泡 (等待数据加载后) ----------
            const loadPromise = loadMessagesFromJSON();
            
            async function initializeBubbles() {
                await loadPromise; // 等待 JSON 加载完成
                
                const randomTexts = getRandomFive();
                
                // 清空 orbit
                orbit.innerHTML = '';
                
                // 创建五个气泡
                for (let i = 0; i < 5; i++) {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    
                    const rawMarkdown = randomTexts[i] || "💕 纪念日快乐";
                    
                    let htmlContent = '';
                    try {
                        htmlContent = marked.parse(rawMarkdown);
                    } catch (e) {
                        htmlContent = `<p>${rawMarkdown}</p>`;
                    }
                    bubble.innerHTML = `<div class="markdown-content">${htmlContent}</div>`;
                    orbit.appendChild(bubble);
                }
                
                // 初始定位
                repositionBubbles();
                
                // 启动动画循环
                startOrbitAnimation();
            }

            // 执行初始化
            initializeBubbles();

            // ---------- 8. 窗口大小改变时重新计算位置 ----------
            window.addEventListener('resize', () => {
                repositionBubbles();
            });

            // ---------- 9. 清理动画 ----------
            window.addEventListener('beforeunload', function() {
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                }
            });

            // ---------- 10. 缩小动画 ----------
            setTimeout(() => {
                wrapper.classList.remove('initial-full');
                wrapper.classList.add('final-state');
                tip.innerText = '💖 爱心飘落 · 卫星环绕 💖';
                tip.style.opacity = '0.8';
            }, 800);

            // ---------- 11. 创建飘落爱心 ----------
            // 确保 DOM 加载完成后再创建爱心
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', createHearts);
            } else {
                createHearts();
            }
        })();
    </script>

    <!-- ========== 部署说明 ========== -->
    <!-- 
        文件结构要求：
        ├── index.html          (本文件)
        ├── messages.json       (可选，外部文本库，格式见下)
        └── picture/
            └── MainPic.jpeg     (纪念图片，正方形推荐)

        messages.json 格式示例：
        {
            "messages": [
                "##标题\n内容支持 *Markdown*",
                "##第二条\n多行内容",
                ...
            ]
        }

        GitHub Pages 部署步骤：
        1. 在 GitHub 新建仓库（如 love-orbit）
        2. 上传所有文件到仓库根目录
        3. 仓库 Settings -> Pages -> 选择 main 分支，根目录，保存
        4. 等待几分钟，访问 https://<用户名>.github.io/<仓库名>/
        
        说明：
        - 本地开发时自动使用内置数据（避免 CORS 问题）
        - 部署到 GitHub Pages 时会自动加载同目录下的 messages.json
        - 如需自定义图片，请将图片放在 picture/MainPic.jpeg
        - 爱心飘落效果会自动运行，营造浪漫氛围
    -->
</body>
</html>
