<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💗 爱心飘落 · 卫星环绕纪念 💗</title>
    <!-- 使用 Marked 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #fff9fc;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow-x: hidden;
            position: relative;
        }

        /* 爱心飘落容器 - 覆盖整个视口 */
        #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 让爱心不阻挡点击 */
            z-index: 1;
            overflow: hidden;
        }

        /* 飘落爱心样式 */
        .heart-decoration {
            position: absolute;
            font-size: 24px;
            color: #ffb6c1; /* 粉色 */
            z-index: 0;
            animation: fall 8s linear infinite;
            opacity: 0.8;
            user-select: none;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(255, 182, 193, 0.5);
        }

        @keyframes fall {
            0% {
                transform: translateY(-20vh) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }

        .frame {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 9 / 16;
            background: rgba(255, 245, 248, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(245, 150, 180, 0.25),
                        0 0 0 2px #ffe2eb inset;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            z-index: 10; /* 确保在主容器在爱心上方 */
        }

        /* 中央图片容器 - 设置固定层级为 20（中间层） */
        .center-image-wrapper {
            width: 30%;
            aspect-ratio: 1 / 1;
            position: relative;
            z-index: 20;  /* 中间层级：高于 behind (5)，低于 front (35) */
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 25px #ffb6c190, 0 0 0 4px #ffe4ed;
            transition: all 0.1s ease;
        }

        .center-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: inherit;
            background: #ffd9e5;
        }
