<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我们的纪念日</title>

    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>

    <style>
        :root {
            --pink-light: #fff0f3;
            --pink: #ffb3c1;
            --pink-mid: #fb6f92;
            --pink-deep: #d6336c;
            --pink-dark: #a61e4d;
            --white: #ffffff;
            --shadow-soft: 0 4px 24px rgba(251, 111, 146, 0.28);
            --shadow-card: 0 10px 44px rgba(214, 51, 108, 0.32);
            --radius-lg: 24px;
            --radius-xl: 32px;
            --font-serif: 'Georgia', 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', serif;
            --font-sans: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-sans);
            background: linear-gradient(170deg, #fff5f7 0%, #ffe4e9 30%, #fff0f3 60%, #fff5f7 100%);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            -webkit-overflow-scrolling: touch;
        }

        /* ========== 爱心飘落容器 ========== */
        .hearts-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .falling-heart {
            position: absolute;
            top: -60px;
            font-size: 22px;
            opacity: 0;
            pointer-events: none;
            animation: heartFall linear infinite;
            filter: blur(0.5px);
            will-change: transform, opacity;
        }

        @keyframes heartFall {
            0% {
                transform: translateY(-60px) rotate(0deg) scale(0.6);
                opacity: 0;
            }
            5% {
                opacity: 0.85;
                transform: translateY(0px) rotate(15deg) scale(1);
            }
            15% {
                opacity: 0.7;
                transform: translateY(12vh) rotate(-20deg) scale(1.1);
            }
            30% {
                opacity: 0.75;
                transform: translateY(25vh) rotate(30deg) scale(0.85);
            }
            50% {
                opacity: 0.55;
                transform: translateY(45vh) rotate(-35deg) scale(1.05);
            }
            70% {
                opacity: 0.5;
                transform: translateY(62vh) rotate(25deg) scale(0.7);
            }
            85% {
                opacity: 0.3;
                transform: translateY(78vh) rotate(-15deg) scale(0.9);
            }
            95% {
                opacity: 0.1;
                transform: translateY(92vh) rotate(10deg) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(105vh) rotate(0deg) scale(0.3);
            }
        }

        /* ========== 场景容器 ========== */
        .scene {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ========== 轨道环装饰 ========== */
        .orbit-ring {
            position: absolute;
            border: 1.5px dashed rgba(251, 111, 146, 0.22);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            will-change: left, top, width, height;
            transition: left 1.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        top 1.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        width 1.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                        height 1.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: orbitShimmer 6s ease-in-out infinite;
        }

        @keyframes orbitShimmer {
            0%, 100% { border-color: rgba(251, 111, 146, 0.18); }
            50%      { border-color: rgba(251, 111, 146, 0.35); }
        }

        /* ========== 装饰星点 (场景内静态) ========== */
        .sparkle-dot {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 179, 193, 0.7), transparent);
            animation: sparkleFloat 4s ease-in-out infinite;
        }

        @keyframes sparkleFloat {
            0%, 100% { opacity: 0.25; transform: translateY(0) scale(1); }
            33%      { opacity: 0.6;  transform: translateY(-6px) scale(1.25); }
            66%      { opacity: 0.35; transform: translateY(3px) scale(0.9); }
        }

        .sparkle-dot:nth-child(odd)  { animation-delay: 0s; }
        .sparkle-dot:nth-child(even) { animation-delay: 2s; }

        /* ========== 顶部区域 ========== */
        .page-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: max(env(safe-area-inset-top, 24px), 24px);
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 1s ease 1.9s, transform 1s ease 1.9s;
        }

        .page-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .page-top .title {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--pink-deep);
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .page-top .days {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--pink-mid);
            letter-spacing: 0.04em;
        }

        .page-top .days strong {
            color: var(--pink-deep);
            font-weight: 700;
            font-size: 1.05rem;
        }

        /* ========== 底部区域 ========== */
        .page-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: max(env(safe-area-inset-bottom, 20px), 20px);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease 1.9s, transform 1s ease 1.9s;
        }

        .page-bottom.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .page-bottom .date-text {
            font-family: var(--font-serif);
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--pink-mid);
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }

        .page-bottom .sep-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .page-bottom .sep-line::before,
        .page-bottom .sep-line::after {
            content: '';
            width: 36px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--pink));
        }

        .page-bottom .sep-line::before {
            background: linear-gradient(to right, transparent, var(--pink));
        }

        .page-bottom .sep-line::after {
            background: linear-gradient(to left, transparent, var(--pink));
        }

        .page-bottom .sep-line .sep-heart {
            font-size: 0.75rem;
            color: var(--pink);
        }

        .page-bottom .names {
            font-family: var(--font-serif);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--pink-dark);
            letter-spacing: 0.08em;
            font-style: italic;
        }

        /* ========== 主图片 ========== */
        .main-image-wrapper {
            position: absolute;
            z-index: 10;
            pointer-events: auto;
            /* 关键修正：统一使用 left:50% top:50% + translate 定位 */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            will-change: width, height, border-radius, box-shadow;
            transition:
                width 1.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                height 1.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                border-radius 1.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 1.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 全屏初始状态 */
        .main-image-wrapper.initial {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            box-shadow: none;
        }

        /* 缩小后的目标状态 */
        .main-image-wrapper.shrunk {
            width: min(54vw, 54vh, 240px);
            height: min(54vw, 54vh, 240px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-soft);
        }

        .main-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: inherit;
        }

        .main-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffd6e0, #ffb3c6);
            color: var(--pink-deep);
            font-size: 3rem;
            border-radius: inherit;
        }

        /* ========== 气泡 ========== */
        .bubble {
            position: absolute;
            z-index: 5;
            pointer-events: auto;
            background: var(--white);
            border: 2.5px solid var(--pink);
            /* 关键修正：允许文本换行，移除截断 */
            border-radius: 22px;
            padding: 10px 16px;
            min-width: 64px;
            max-width: 170px;
            text-align: center;
            cursor: default;
            box-shadow: 0 2px 14px rgba(251, 111, 146, 0.2);
            transition:
                box-shadow 0.3s ease,
                border-color 0.3s ease,
                transform 0.15s ease;
            will-change: transform, z-index;
            /* 文本换行 + 保持单词完整性 */
            white-space: normal;
            word-break: keep-all;
            overflow-wrap: break-word;
            line-height: 1.45;
        }

        .bubble.clickable {
            cursor: pointer;
            border-color: var(--pink-mid);
            box-shadow: 0 2px 18px rgba(251, 111, 146, 0.34);
            animation: bubblePulse 2.5s ease-in-out infinite;
        }

        .bubble.clickable:active {
            transform: translate(-50%, -50%) scale(0.8) !important;
            box-shadow: 0 1px 8px rgba(251, 111, 146, 0.45);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        @keyframes bubblePulse {
            0%,
            100% {
                box-shadow: 0 2px 16px rgba(251, 111, 146, 0.28);
            }
            50% {
                box-shadow: 0 4px 26px rgba(251, 111, 146, 0.5);
            }
        }

        .bubble .bubble-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--pink-dark);
            line-height: 1.5;
            letter-spacing: 0.02em;
            font-family: var(--font-serif);
            display: block;
        }

        .bubble .bubble-text p {
            margin: 0;
            display: inline;
        }

        .bubble .bubble-text strong {
            color: var(--pink-deep);
            font-weight: 700;
        }

        .bubble .bubble-text em {
            color: var(--pink-mid);
            font-style: italic;
        }

        .bubble .bubble-text h2 {
            font-size: 0.9rem;
            margin: 0 0 2px 0;
            font-weight: 700;
            color: var(--pink-deep);
            display: block;
        }

        .bubble .bubble-text h2+* {
            display: block;
            margin-top: 2px;
        }


        /* ========== 详情弹窗 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(166, 30, 77, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            position: relative;
            width: 70%;
            height: 70%;
            max-width: 520px;
            max-height: 720px;
            background: #fff5f7;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 28px 24px 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateY(30px) scale(0.94);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0) scale(1);
        }

        .modal-close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--pink-light);
            color: var(--pink-deep);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(214, 51, 108, 0.15);
            line-height: 1;
        }

        .modal-close-btn:active {
            background: var(--pink);
            color: var(--white);
            transform: scale(0.88);
        }

        .modal-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .modal-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .modal-scroll::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 4px;
        }
        .modal-scroll::-webkit-scrollbar-thumb {
            background: var(--pink);
            border-radius: 4px;
        }

        .modal-detail-content {
            font-family: var(--font-serif);
            color: var(--pink-deep);
            font-size: 0.95rem;
            line-height: 1.8;
            letter-spacing: 0.03em;
            word-break: break-word;
        }

        .modal-detail-content p {
            margin-bottom: 0.8em;
        }
        .modal-detail-content p:last-child {
            margin-bottom: 0;
        }
        .modal-detail-content strong {
            color: var(--pink-dark);
            font-weight: 700;
        }
        .modal-detail-content em {
            color: var(--pink-mid);
        }
        .modal-detail-content a {
            color: var(--pink-mid);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .modal-detail-content blockquote {
            border-left: 3px solid var(--pink);
            padding-left: 14px;
            margin: 0.6em 0;
            color: #c44a6e;
            font-style: italic;
        }
        .modal-detail-content ul,
        .modal-detail-content ol {
            padding-left: 1.4em;
            margin: 0.5em 0;
        }
        .modal-detail-content li {
            margin-bottom: 0.3em;
        }
        .modal-detail-content hr {
            border: none;
            border-top: 1.5px dashed var(--pink);
            margin: 1em 0;
        }
        .modal-detail-content code {
            background: #ffe4ea;
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 0.85em;
            color: var(--pink-dark);
        }
        .modal-detail-content img {
            max-width: 100%;
            border-radius: 12px;
            margin: 0.5em 0;
        }

        /* ========== 响应式微调 ========== */
        @media screen and (max-width: 360px) {
            .bubble {
                padding: 8px 12px;
                max-width: 140px;
                min-width: 52px;
                border-radius: 18px;
            }
            .bubble .bubble-text {
                font-size: 0.75rem;
            }
            .modal-card {
                padding: 22px 16px 18px;
            }
            .modal-detail-content {
                font-size: 0.85rem;
            }
        }

        @media screen and (min-width: 500px) {
            .main-image-wrapper.shrunk {
                width: min(50vw, 280px);
                height: min(50vw, 280px);
            }
            .bubble {
                max-width: 190px;
                padding: 12px 20px;
            }
            .bubble .bubble-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 爱心飘落层 ==================== -->
    <div class="hearts-layer" id="heartsLayer" aria-hidden="true"></div>

    <!-- ==================== 顶部区域 ==================== -->
    <div class="page-top" id="pageTop">
        <div class="title">我们的纪念日</div>
        <div class="days" id="daysCounter"></div>
    </div>

    <!-- ==================== 底部区域 ==================== -->
    <div class="page-bottom" id="pageBottom">
        <div class="date-text" id="dateText"></div>
        <div class="sep-line"><span class="sep-heart">♡</span></div>
        <div class="names" id="namesText"></div>
    </div>

    <!-- ==================== 场景容器 ==================== -->
    <div class="scene" id="scene">
        <!-- 主图片 -->
        <div class="main-image-wrapper initial" id="mainImageWrapper">
            <img
            src="picture/MainPic.jpeg"
            alt="我们的照片"
            id="mainImage"
            loading="eager"
            onerror="handleImageError()"
            >
            <div class="main-image-placeholder" id="imagePlaceholder" style="display:none;">
                💕
            </div>
        </div>
        <!-- 轨道环装饰 -->
        <div class="orbit-ring" id="orbitRing"></div>
        <!-- 装饰星点 -->
        <span class="sparkle-dot" id="sparkle1"></span>
        <span class="sparkle-dot" id="sparkle2"></span>
        <span class="sparkle-dot" id="sparkle3"></span>
        <span class="sparkle-dot" id="sparkle4"></span>
        <span class="sparkle-dot" id="sparkle5"></span>
        <span class="sparkle-dot" id="sparkle6"></span>
        <!-- 气泡由JS动态创建并插入scene -->
    </div>

    <!-- ==================== 详情弹窗 ==================== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
            <button class="modal-close-btn" id="modalCloseBtn" aria-label="关闭详情">✕</button>
            <div class="modal-scroll" id="modalScroll">
                <div class="modal-detail-content" id="modalDetailContent"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 版本标识 ====================
            const APP_VERSION = '3.1.0';
            console.log(`💕 情侣纪念页 v${APP_VERSION} 已加载`);

            // ==================== DOM 引用 ====================
            const heartsLayer = document.getElementById('heartsLayer');
            const scene = document.getElementById('scene');
            const orbitRing = document.getElementById('orbitRing');
            const mainImageWrapper = document.getElementById('mainImageWrapper');
            const mainImage = document.getElementById('mainImage');
            const imagePlaceholder = document.getElementById('imagePlaceholder');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalCard = document.getElementById('modalCard');
            const modalScroll = document.getElementById('modalScroll');
            const modalDetailContent = document.getElementById('modalDetailContent');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const pageTop = document.getElementById('pageTop');
            const pageBottom = document.getElementById('pageBottom');
            const daysCounter = document.getElementById('daysCounter');
            const dateText = document.getElementById('dateText');
            const namesText = document.getElementById('namesText');

            // ==================== 内置备用设置 ====================
            const FALLBACK_SETTINGS = {
                startDate: '2023-03-11',
                names: ['朱方逸', '江玥莹'],
            };

            // ==================== 内置备用数据 ====================
            const FALLBACK_MESSAGES = [
                { short: 'Error:Did not load msgfile correctly', detail: 'JUST DO NOT PLAY ANYMORE!GO AND FIX THIS BUG!' },
                { short: 'Error:Did not load msgfile correctly' },
                { short: 'Error:Did not load msgfile correctly' },
                { short: 'Error:Did not load msgfile correctly' },
                { short: 'Error:Did not load msgfile correctly' },
                { short: 'Error:Did not load msgfile correctly' },
            ];

            // ==================== 数据规范化 ====================
            function normalizeEntry(entry) {
                if (typeof entry === 'string') {
                    return { short: entry, detail: undefined };
                }
                if (entry && typeof entry === 'object' && typeof entry.short === 'string') {
                    return {
                        short: entry.short,
                        detail: typeof entry.detail === 'string' ? entry.detail : undefined,
                    };
                }
                console.warn('无效数据条目，已跳过:', entry);
                return null;
            }

            function normalizeData(rawData) {
                if (!Array.isArray(rawData)) {
                    console.warn('数据格式错误：期望数组，收到', typeof rawData);
                    return [];
                }
                return rawData
                    .map(normalizeEntry)
                    .filter(entry => entry !== null && entry.short && entry.short.trim().length > 0);
            }

            // ==================== 随机抽取 ====================
            function pickRandom(items, count) {
                if (items.length === 0) return [];
                const shuffled = [...items];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled.slice(0, Math.min(count, items.length));
            }

            // ==================== Markdown 渲染 ====================
            function renderMarkdown(text) {
                if (!text || typeof text !== 'string') return '';
                try {
                    if (typeof marked !== 'undefined' && marked.parse) {
                        return marked.parse(text);
                    }
                } catch (e) {
                    console.warn('marked.js 渲染失败，使用纯文本:', e);
                }
                return text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\n/g, '<br>');
            }

            // ==================== 图片加载错误处理 ====================
            function handleImageError() {
                console.warn('主图片加载失败，使用占位符');
                if (mainImage) {
                    mainImage.style.display = 'none';
                }
                if (imagePlaceholder) {
                    imagePlaceholder.style.display = 'flex';
                }
            }
            window.handleImageError = handleImageError;

            // ==================== 爱心飘落 ====================
            function createFallingHeart() {
                const heart = document.createElement('span');
                heart.classList.add('falling-heart');
                const heartEmojis = ['❤️', '💕', '💗', '💖', '💝', '💘', '🌸', '🩷', '💓', '💞', '🫶', '✨'];
                heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];

                const size = Math.random() * 22 + 14;
                const leftPos = Math.random() * 94 + 3;
                const duration = Math.random() * 6 + 4;
                const delay = Math.random() * 5;
                const opacity = Math.random() * 0.5 + 0.35;

                heart.style.cssText = `
                    font-size: ${size}px;
                    left: ${leftPos}%;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    opacity: ${opacity};
                `;

                heartsLayer.appendChild(heart);

                const totalDuration = (duration + delay) * 1000;
                setTimeout(() => {
                    if (heart.parentNode) {
                        heart.remove();
                    }
                    createFallingHeart();
                }, totalDuration + 200);
            }

            function initHearts() {
                const initialCount = 20;
                for (let i = 0; i < initialCount; i++) {
                    setTimeout(() => {
                        createFallingHeart();
                    }, i * 250);
                }
                setInterval(() => {
                    const currentHearts = heartsLayer.querySelectorAll('.falling-heart').length;
                    if (currentHearts < 25) {
                        createFallingHeart();
                    }
                }, 1500);
            }

            // ==================== 气泡与轨道 ====================
            let bubbles = [];
            let orbitAnimationId = null;
            let orbitCenterX = 0;
            let orbitCenterY = 0;
            let orbitRadiusX = 0;
            let orbitRadiusY = 0;
            const ORBIT_SPEED = 0.004;
            const BUBBLE_COUNT = 5;
            let orbitStarted = false;

            function updateOrbitParams() {
                const wrapperRect = mainImageWrapper.getBoundingClientRect();
                orbitCenterX = wrapperRect.left + wrapperRect.width / 2;
                orbitCenterY = wrapperRect.top + wrapperRect.height / 2;

                const avgBubbleSize = 65;
                orbitRadiusX = wrapperRect.width * 0.72 + avgBubbleSize;
                orbitRadiusY = wrapperRect.height * 0.58 + avgBubbleSize;

                orbitRadiusX = Math.max(orbitRadiusX, 130);
                orbitRadiusY = Math.max(orbitRadiusY, 95);
            }

            function createBubbleElement(item, index) {
                const el = document.createElement('div');
                el.classList.add('bubble');
                if (item.detail) {
                    el.classList.add('clickable');
                    el.setAttribute('data-has-detail', 'true');
                }
                el.setAttribute('data-index', index);

                const renderedShort = renderMarkdown(item.short);
                const textSpan = document.createElement('span');
                textSpan.classList.add('bubble-text');
                textSpan.innerHTML = renderedShort;
                el.appendChild(textSpan);

                if (item.detail) {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openDetailModal(item.detail);
                    });
                    el.addEventListener('touchend', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        openDetailModal(item.detail);
                    });
                }

                el.style.opacity = '0';
                el.style.transition = 'opacity 0.6s ease';

                scene.appendChild(el);
                return el;
            }

            function positionBubbleOnOrbit(el, angle) {
                const x = orbitCenterX + orbitRadiusX * Math.cos(angle);
                const y = orbitCenterY + orbitRadiusY * Math.sin(angle);

                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.transform = 'translate(-50%, -50%)';

                const isBelowCenter = y > orbitCenterY;
                el.style.zIndex = isBelowCenter ? '15' : '5';
            }

            function updateOrbitRing() {
                const w = orbitRadiusX * 2;
                const h = orbitRadiusY * 2;
                orbitRing.style.left = (orbitCenterX - orbitRadiusX) + 'px';
                orbitRing.style.top = (orbitCenterY - orbitRadiusY) + 'px';
                orbitRing.style.width = w + 'px';
                orbitRing.style.height = h + 'px';
            }

            function positionSparkleDots() {
                const ids = ['sparkle1', 'sparkle2', 'sparkle3', 'sparkle4', 'sparkle5', 'sparkle6'];
                const angleStep = (Math.PI * 2) / ids.length;
                ids.forEach((id, i) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    const angle = angleStep * i;
                    const rx = orbitRadiusX + Math.random() * 30 - 15;
                    const ry = orbitRadiusY + Math.random() * 30 - 15;
                    const x = orbitCenterX + rx * Math.cos(angle);
                    const y = orbitCenterY + ry * Math.sin(angle);
                    const size = Math.random() * 10 + 6;
                    el.style.left = x + 'px';
                    el.style.top = y + 'px';
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                });
            }

            function startOrbitAnimation() {
                if (orbitAnimationId) return;
                updateOrbitParams();

                function animate() {
                    updateOrbitParams();
                    updateOrbitRing();

                    for (let i = 0; i < bubbles.length; i++) {
                        bubbles[i].angle += ORBIT_SPEED;
                        if (bubbles[i].angle > Math.PI * 2) {
                            bubbles[i].angle -= Math.PI * 2;
                        }
                        positionBubbleOnOrbit(bubbles[i].element, bubbles[i].angle);
                    }

                    orbitAnimationId = requestAnimationFrame(animate);
                }

                orbitAnimationId = requestAnimationFrame(animate);
                orbitStarted = true;
                console.log('🪐 轨道动画已启动');
            }

            function stopOrbitAnimation() {
                if (orbitAnimationId) {
                    cancelAnimationFrame(orbitAnimationId);
                    orbitAnimationId = null;
                }
                orbitStarted = false;
            }

            function showBubbles() {
                bubbles.forEach(b => {
                    b.element.style.opacity = '1';
                });
                console.log('💬 气泡已显示');
            }

            function clearBubbles() {
                stopOrbitAnimation();
                bubbles.forEach(b => {
                    if (b.element && b.element.parentNode) {
                        b.element.remove();
                    }
                });
                bubbles = [];
            }

            function initBubbles(dataItems) {
                clearBubbles();

                const selected = pickRandom(dataItems, BUBBLE_COUNT);
                if (selected.length === 0) {
                    console.warn('没有可用数据来创建气泡');
                    return;
                }

                const angleStep = (Math.PI * 2) / selected.length;
                const startOffset = -Math.PI / 2;

                selected.forEach((item, i) => {
                    const el = createBubbleElement(item, i);
                    const angle = startOffset + i * angleStep;
                    bubbles.push({
                        element: el,
                        data: item,
                        angle: angle,
                    });
                });

                // 用初始全屏位置做一次预定位（不重要，反正此时气泡隐藏）
                updateOrbitParams();
                bubbles.forEach(b => {
                    positionBubbleOnOrbit(b.element, b.angle);
                });

                // 关键修正：不在此处启动轨道动画！
                // 轨道动画将在开场动画结束后启动
            }

            // ==================== 详情弹窗 ====================
            function openDetailModal(detailText) {
                if (!detailText || typeof detailText !== 'string') return;

                const rendered = renderMarkdown(detailText);
                modalDetailContent.innerHTML = rendered;
                modalScroll.scrollTop = 0;
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeDetailModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
                setTimeout(() => {
                    modalDetailContent.innerHTML = '';
                }, 350);
            }

            modalCloseBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                closeDetailModal();
            });

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    closeDetailModal();
                }
            });

            modalCard.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                    closeDetailModal();
                }
            });

            // ==================== 开场动画 ====================
            function startIntroAnimation() {
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        mainImageWrapper.classList.remove('initial');
                        mainImageWrapper.classList.add('shrunk');
                        console.log('🎬 开场动画开始，图片缩小中...');
                    });
                });

                // 关键修正：等动画结束后再启动轨道 + 显示气泡
                const TRANSITION_DURATION = 1700; // 略长于CSS transition 1.6s
                setTimeout(() => {
                    console.log('🎬 动画结束，启动轨道与气泡');
                    updateOrbitParams();
                    updateOrbitRing();
                    positionSparkleDots();
                    // 重新定位所有气泡
                    bubbles.forEach(b => {
                        positionBubbleOnOrbit(b.element, b.angle);
                    });
                    // 启动轨道动画
                    startOrbitAnimation();
                    // 显示气泡
                    showBubbles();
                }, TRANSITION_DURATION);
            }

            // ==================== 窗口大小调整 ====================
            let resizeDebounceTimer = null;

            function handleResize() {
                clearTimeout(resizeDebounceTimer);
                resizeDebounceTimer = setTimeout(() => {
                    if (!orbitStarted) return;
                    updateOrbitParams();
                    updateOrbitRing();
                    if (bubbles.length > 0) {
                        bubbles.forEach(b => {
                            positionBubbleOnOrbit(b.element, b.angle);
                        });
                    }
                }, 200);
            }

            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', () => {
                setTimeout(handleResize, 400);
            });

            // ==================== 设置加载 ====================
            async function loadSettings() {
                const isFileProtocol = window.location.protocol === 'file:';

                if (isFileProtocol) {
                    console.log('📁 检测到 file:// 协议，使用内置备用设置');
                    return FALLBACK_SETTINGS;
                }

                try {
                    console.log('🌐 尝试加载 setting.json...');
                    const response = await fetch('setting.json', {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' },
                        signal: AbortSignal.timeout ? AbortSignal.timeout(5000) : undefined,
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    if (!data || typeof data.startDate !== 'string' || !Array.isArray(data.names)) {
                        throw new Error('setting.json 字段不完整');
                    }

                    console.log('✅ 成功加载设置');
                    return {
                        startDate: data.startDate,
                        names: data.names,
                    };
                } catch (err) {
                    console.warn('⚠️ 加载 setting.json 失败，使用内置备用设置:', err.message);
                    return FALLBACK_SETTINGS;
                }
            }

            function calculateDays(startDateStr) {
                try {
                    const start = new Date(startDateStr + 'T00:00:00');
                    if (isNaN(start.getTime())) throw new Error('无效日期');
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
                    return Math.max(diff, 0);
                } catch (e) {
                    console.warn('日期计算失败:', e);
                    return null;
                }
            }

            function formatDateChinese(dateStr) {
                try {
                    const d = new Date(dateStr + 'T00:00:00');
                    if (isNaN(d.getTime())) return dateStr;
                    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
                } catch (e) {
                    return dateStr;
                }
            }

            function renderTopSection(settings) {
                const days = calculateDays(settings.startDate);
                if (days !== null) {
                    daysCounter.innerHTML = `在一起的第 <strong>${days}</strong> 天`;
                } else {
                    daysCounter.textContent = '';
                }
                pageTop.classList.add('visible');
            }

            function renderBottomSection(settings) {
                dateText.textContent = formatDateChinese(settings.startDate);
                if (settings.names && settings.names.length >= 2) {
                    namesText.textContent = settings.names[0] + '  &  ' + settings.names[1];
                } else if (settings.names && settings.names.length === 1) {
                    namesText.textContent = settings.names[0];
                }
                pageBottom.classList.add('visible');
            }

            // ==================== 数据加载 ====================
            async function loadMessages() {
                const isFileProtocol = window.location.protocol === 'file:';

                if (isFileProtocol) {
                    console.log('📁 检测到 file:// 协议，使用内置备用数据');
                    return normalizeData(FALLBACK_MESSAGES);
                }

                try {
                    console.log('🌐 尝试加载 messages.json...');
                    const response = await fetch('messages.json', {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                        },
                        signal: AbortSignal.timeout ? AbortSignal.timeout(5000) : undefined,
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const rawData = await response.json();
                    const normalized = normalizeData(rawData);

                    if (normalized.length === 0) {
                        throw new Error('messages.json 中无有效数据');
                    }

                    console.log(`✅ 成功加载 ${normalized.length} 条外部数据`);
                    return normalized;
                } catch (err) {
                    console.warn('⚠️ 加载 messages.json 失败，使用内置备用数据:', err.message);
                    return normalizeData(FALLBACK_MESSAGES);
                }
            }

            // ==================== 初始化流程 ====================
            async function init() {
                console.log('🚀 初始化开始...');

                // 1. 爱心飘落
                initHearts();

                // 2. 加载设置
                const settings = await loadSettings();
                renderTopSection(settings);
                renderBottomSection(settings);

                // 3. 加载数据
                const messages = await loadMessages();
                console.log(`📋 可用数据: ${messages.length} 条`);

                // 4. 初始化气泡（隐藏状态，轨道尚未启动）
                initBubbles(messages);

                // 5. 启动开场动画
                setTimeout(() => {
                    startIntroAnimation();
                }, 300);

                console.log('✨ 初始化完成！');
            }

            // ==================== 启动应用 ====================
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // ==================== 清理 ====================
            window.addEventListener('beforeunload', () => {
                stopOrbitAnimation();
            });

            // ==================== 调试接口 ====================
            if (typeof window !== 'undefined') {
                window.__lovePage = {
                    version: APP_VERSION,
                    bubbles,
                    messages: FALLBACK_MESSAGES,
                    resetAnimation: () => {
                        mainImageWrapper.classList.add('initial');
                        mainImageWrapper.classList.remove('shrunk');
                        stopOrbitAnimation();
                        bubbles.forEach(b => { b.element.style.opacity = '0'; });
                        setTimeout(() => startIntroAnimation(), 300);
                    },
                    reloadData: async () => {
                        const messages = await loadMessages();
                        initBubbles(messages);
                        // 重新触发动画结束后的流程
                        setTimeout(() => {
                            updateOrbitParams();
                            bubbles.forEach(b => positionBubbleOnOrbit(b.element, b.angle));
                            startOrbitAnimation();
                            showBubbles();
                        }, 100);
                        console.log('🔄 数据已重新加载');
                    },
                };
                console.log('💡 调试接口已挂载到 window.__lovePage');
            }
        })();
    </script>
</body>
