<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💗 爱心飘落 · 卫星环绕纪念 💗</title>
    <!-- 使用 Marked 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #fff9fc;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow-x: hidden;
            position: relative;
        }

        /* 爱心飘落容器 - 覆盖整个视口 */
        #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 让爱心不阻挡点击 */
            z-index: 1;
            overflow: hidden;
        }

        /* 飘落爱心样式 */
        .heart-decoration {
            position: absolute;
            font-size: 24px;
            color: #ffb6c1; /* 粉色 */
            z-index: 0;
            animation: fall 8s linear infinite;
            opacity: 0.8;
            user-select: none;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(255, 182, 193, 0.5);
        }

        @keyframes fall {
            0% {
                transform: translateY(-20vh) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }

        .frame {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 9 / 16;
            background: rgba(255, 245, 248, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(245, 150, 180, 0.25),
                        0 0 0 2px #ffe2eb inset;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            z-index: 10; /* 确保在主容器在爱心上方 */
        }

        /* 中央图片容器 - 设置固定层级为 20（中间层） */
        .center-image-wrapper {
            width: 30%;
            aspect-ratio: 1 / 1;
            position: relative;
            z-index: 20;  /* 中间层级：高于 behind (5)，低于 front (35) */
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 25px #ffb6c190, 0 0 0 4px #ffe4ed;
            transition: all 0.1s ease;
        }

        .center-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: inherit;
            background: #ffd9e5;
        }

        /* 轨道容器 - 不再整体旋转 */
        .orbit-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
        }

        /* 气泡基础样式 */
        .bubble {
            position: absolute;
            width: 120px;
            max-width: 30vw;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: #fff0f5;
            border: 2px solid #ffb3c6;
            border-radius: 32px 32px 32px 8px;
            padding: 12px 14px;
            box-shadow: 0 10px 20px #ffa5b9a0, 0 4px 0 0 #fcc4d2 inset;
            color: #a93f5c;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            pointer-events: auto;
            transition: transform 0.2s ease, filter 0.3s;
            transform-origin: center;
            left: 50%;
            top: 50%;
            opacity: 0;
            animation: bubble-fadein 0.4s forwards;
        }

        /* 淡入动画 */
        @keyframes bubble-fadein {
            0% { opacity: 0; transform: scale(0.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 遮挡关系类 - 重新定义层级 */
        .bubble.behind {
            z-index: 5;  /* 在主图片后面 (主图片 z-index:20) */
        }

        .bubble.front {
            z-index: 35; /* 在主图片前面 (主图片 z-index:20) */
        }

        /* 气泡内的 markdown 样式 */
        .bubble h1, .bubble h2, .bubble h3 {
            font-size: 1.3em;
            color: #c34f6a;
            margin: 4px 0;
        }
        .bubble p {
            margin: 4px 0;
        }
        .bubble em {
            color: #d66b81;
        }
        .bubble strong {
            color: #b3405c;
        }
        .bubble a {
            color: #b33f5c;
            text-decoration: underline wavy #ffb0c0 1px;
        }

        /* 全屏缩小动画相关 */
        .center-image-wrapper.initial-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 0;
            z-index: 100;  /* 全屏时在最上层 */
            box-shadow: none;
            transition: all 1.2s cubic-bezier(0.34, 1.2, 0.55, 1);
        }

        .center-image-wrapper.initial-full .center-image {
            border-radius: 0;
        }

        .center-image-wrapper.final-state {
            position: relative;
            width: 30%;
            top: auto;
            left: auto;
            border-radius: 30px;
            box-shadow: 0 15px 25px #ffb6c190, 0 0 0 4px #ffe4ed;
            transition: all 1.2s cubic-bezier(0.34, 1.2, 0.55, 1);
            z-index: 20;  /* 确保最终状态也是中间层 */
        }

        /* 装饰元素 */
        .decoration-dot {
            position: absolute;
            bottom: 12px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #ffc1d0, #ffd9e4);
            border-radius: 50%;
            opacity: 0.5;
            z-index: 5;
        }
        .decoration-heart {
            position: absolute;
            top: 16px;
            left: 16px;
            font-size: 24px;
            filter: drop-shadow(0 4px 6px #fbb6c6);
            z-index: 6;
            opacity: 0.7;
        }
        .loading-tip {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: #cc8195;
            font-size: 15px;
            letter-spacing: 1px;
            z-index: 10;
            background: linear-gradient(90deg, transparent, #ffe3ec, transparent);
            padding: 8px;
        }

        .markdown-content {
            user-select: text;
        }
    </style>
</head>
<body>
    <!-- 爱心飘落容器 -->
    <div id="container"></div>

    <div class="frame">
        <div class="decoration-heart">💗🌸💗</div>
        <div class="decoration-dot"></div>

        <!-- 图片A包装：使用相对路径 -->
